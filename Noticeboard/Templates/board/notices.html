{% extends 'board/base.html' %}

{% block content %}

<div class="card mb-4 shadow-sm">
    <div class="card-header bg-dark text-white">
        <h4 class="mb-0">Create Notice</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Save Notice</button>
        </form>
    </div>
</div>

<hr>

<h2>All Notices</h2>

{% for notice in notices %}
    <div class="card mb-3 shadow-sm">
        <div class="card-body">
            <h4 class="card-title">{{ notice.title }}</h4>
            <p class="card-text">{{ notice.text }}</p>
            <small class="text-muted">{{ notice.created_at }}</small>
        </div>
    </div>
{% empty %}
    <p>No notices yet.</p>
{% endfor %}

{% endblock %}

{% extends 'board/base.html' %}

{% block content %}

<h2>Recent Notices</h2>

{% for notice in notices %}
    <div class="card mb-3 shadow-sm">
        <div class="card-body">
            <h4 class="card-title">{{ notice.title }}</h4>
            <p class="card-text">{{ notice.text }}</p>
            <small class="text-muted">Posted by {{ notice.user.username }} on {{ notice.created_at|date:"M d, Y H:i" }}</small>
        </div>
    </div>
{% empty %}
    <p>No notices yet.</p>
{% endfor %}

{% endblock %}

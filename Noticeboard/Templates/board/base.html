{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Mini Project</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet">

    <link rel="stylesheet" href="{% static 'board/style.css' %}">
</head>
<body>

    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container">

            <!-- Left side -->
            <div class="d-flex align-items-center">
                <a class="navbar-brand text-white me-4" href="{% url 'home' %}">
                    Mini Project
                </a>

                <a class="nav-link text-white me-3" href="{% url 'home' %}">Home</a>
                <a class="nav-link text-white me-3" href="{% url 'about' %}">About</a>
                <a class="nav-link text-white" href="{% url 'notices' %}">Notices</a>
            </div>

            <!-- Right side -->
            <div class="d-flex align-items-center ms-auto">
                {% if user.is_authenticated %}
                    <a class="nav-link text-white" href="{% url 'profile' %}">
                        <span class="text-white me-3">
                            {{ user.username }}
                        </span>
                    </a>
                    <form method="post" action="{% url 'logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link nav-link text-warning p-0">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a class="nav-link text-white me-3" href="{% url 'login' %}">
                        Login
                    </a>
                    <a class="nav-link text-success" href="{% url 'signup' %}">
                        Sign Up
                    </a>
                {% endif %}
            </div>

        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
